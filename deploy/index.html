<style id="theme-styles">
:root {
  --page-bg: #FFFCF8;
  --text-primary: #2D2A26;
  --text-secondary: #5A5652;
  --accent: #6B7F6E;
  --accent-warm: #C17C60;
  --border: #EDE8E1;
  --card-bg: #FFFFFF;
  --card-border: #EDE8E1;
  --overlay-bg: rgba(255,252,248,0.95);
}
html.dark {
  --page-bg: #1A1A1A;
  --text-primary: #F5F1EB;
  --text-secondary: #B8B0A8;
  --accent: #98C9A8;
  --accent-warm: #E8A888;
  --border: #3A3A3A;
}
html, body { background: var(--page-bg); color: var(--text-primary); }
html.dark { background: var(--page-bg); }
html.dark a { color: #98C9A8; }
html.dark a:hover { color: #E8A888; }
html.dark button, html.dark [role="button"] { background: #2A2A2A; color: #F5F1EB; border-color: #3A3A3A; }
html.dark .ss-card { background: #2A2A2A; border-color: #3A3A3A; }
html.dark .ss-overlay, html.dark .ss-overlay-inner { background: rgba(26,26,26,0.95); color: #F5F1EB; }
html.dark .ss-card { background: #2A2A2A; border-color: #3A3A3A; }
html.dark .ss-breath { background: rgba(152,201,168,0.2); border-color: rgba(152,201,168,0.3); }
html.dark .ss-breath-label { color: #98C9A8; }
html.dark .ss-breath-text { color: #F5F1EB; }
html.dark .ss-ground-step { background: #2A2A2A; border-color: #3A3A3A; }
html.dark .ss-fab { background: #F5F1EB; color: #1A1A1A; }
html.dark .ss-toast { background: #F5F1EB; color: #1A1A1A; }
html.dark ::selection { background: #98C9A8; color: #1A1A1A; }
html.dark ::-webkit-scrollbar-thumb { background: #3A3A3A; }
html.dark .ss-firefly { background: #98C9A8; box-shadow: 0 0 12px #98C9A8, 0 0 28px #98C9A8; }
html.dark .ss-word { color: #98C9A8; }
html.dark .ss-fab { background: #F5F1EB; color: #1A1A1A; }
html.dark .ss-toast { background: #F5F1EB; color: #1A1A1A; }
html.dark ::selection { background: #98C9A8; color: #1A1A1A; }
html.dark ::-webkit-scrollbar-thumb { background: #3A3A3A; }

<script>
(function() {
  const toggle = document.getElementById("theme-toggle");
  const sunIcon = toggle?.querySelector(".sun-icon");
  const moonIcon = toggle?.querySelector(".moon-icon");
  const html = document.documentElement;
  
  function applyTheme(dark) {
    if (dark) {
      html.classList.add("dark");
      sunIcon?.style.removeProperty("display");
      moonIcon?.style.setProperty("display", "none");
    } else {
      html.classList.remove("dark");
      sunIcon?.style.setProperty("display", "none");
      moonIcon?.style.removeProperty("display");
    }
  }
  
  // Initial
  const stored = localStorage.getItem("theme");
  if (stored) {
    applyTheme(stored === "dark");
  } else {
    applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches);
  }
  
  toggle?.addEventListener("click", function() {
    const isDark = !document.documentElement.classList.contains("dark");
    applyTheme(isDark);
    localStorage.setItem("theme", isDark ? "dark" : "light");
  });
  
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function(e) {
    if (!localStorage.getItem("theme")) applyTheme(e.matches);
  });
})();
</script>
