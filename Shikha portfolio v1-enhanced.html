  #ss-progress {
    position: fixed; top: 0; left: 0; right: 0; height: 2px;

    z-index: 60; pointer-events: none; will-change: transform;
  }
  .ss-blobs {
    position: fixed; inset: 0; overflow: hidden; pointer-events: none;
    z-index: 0; opacity: .55;
  }
  .ss-blobs > div {
    position: absolute; border-radius: 50%; filter: blur(80px);
  }
  .ss-blob1 { width: 480px; height: 480px; top: -120px; left: -80px;
    background: radial-gradient(60% 60% at 50% 30%, #E6DDD3 0%, transparent 70%); }
  .ss-blob2 { width: 520px; height: 520px; top: 460px; right: -120px;

  .ss-blob3 { width: 380px; height: 380px; top: 1180px; left: 18%;
    background: radial-gradient(60% 60% at 50% 50%, #A9BFAE 0%, transparent 70%); }

  .ss-reveal { opacity: 0; transform: translateY(24px);
    transition: opacity .8s cubic-bezier(.22,1,.36,1), transform .8s cubic-bezier(.22,1,.36,1); }
  .ss-reveal.ss-in { opacity: 1; transform: none; }

  .ss-magnetic { transition: transform .25s cubic-bezier(.22,1,.36,1); will-change: transform; }

  .ss-toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(24px);
    background: #2D2A26; color: #FFFCF8; padding: 12px 22px; border-radius: 999px;

  .ss-overlay {
    position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center;
    background: rgba(255,252,248,.9); backdrop-filter: blur(8px); padding: 32px;
    opacity: 0; transition: opacity .3s ease;
  }
  .ss-overlay.ss-show { opacity: 1; }
  .ss-overlay-inner {

    width: 100%; max-width: 440px;
  }
  .ss-overlay.ss-show .ss-overlay-inner { transform: none; }

    .ss-breath, .ss-breath.inhale, .ss-breath.hold, .ss-breath.exhale { transition: none !important; }
    .ss-magnetic { transition: none !important; }

<script>
(function () {
  "use strict";
  var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function ready(cb) {
    if (document.querySelector("nav") && document.querySelector("#root") && document.querySelector("#root").children.length) {
      cb();
    } else {
      setTimeout(function () { ready(cb); }, 60);
    }
  }

  function el(tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  }

  ready(function () {
    var body = document.body;

    /* ---- scroll progress bar ---- */
    var bar = el("div"); bar.id = "ss-progress"; body.appendChild(bar);
    function onScroll() {
      var h = document.documentElement;
      var max = h.scrollHeight - h.clientHeight;
      var p = max > 0 ? h.scrollTop / max : 0;
      bar.style.transform = "scaleX(" + p + ")";
    }
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();

    /* ---- background blobs ---- */
    var blobs = el("div", "ss-blobs");
    blobs.appendChild(el("div", "ss-blob1"));
    blobs.appendChild(el("div", "ss-blob2"));
    blobs.appendChild(el("div", "ss-blob3"));
    body.insertBefore(blobs, body.firstChild);

    /* ---- reveal on scroll ---- */
    var revealTargets = document.querySelectorAll('section[id], main > div, [class*="max-w-content"]');
    revealTargets.forEach(function (t) { t.classList.add("ss-reveal"); });
    if ("IntersectionObserver" in window && !reduce) {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("ss-in"); io.unobserve(e.target); }
        });
      }, { rootMargin: "-100px" });
      revealTargets.forEach(function (t) { io.observe(t); });
    } else {
      revealTargets.forEach(function (t) { t.classList.add("ss-in"); });
    }

    /* ---- magnetic buttons ---- */
    if (!reduce) {
      var ctas = document.querySelectorAll('a[class*="rounded-full"], button[class*="rounded-full"]');
      ctas.forEach(function (b) {
        b.classList.add("ss-magnetic");
        b.addEventListener("mousemove", function (ev) {
          var r = b.getBoundingClientRect();
          var x = (ev.clientX - r.left - r.width / 2) * 0.3;
          var y = (ev.clientY - r.top - r.height / 2) * 0.3;
          b.style.transform = "translate(" + x + "px," + y + "px)";
        });
        b.addEventListener("mouseleave", function () { b.style.transform = "translate(0,0)"; });
      });
    }

    /* ---- toast ---- */
    var toast = el("div", "ss-toast"); body.appendChild(toast);
    var toastTimer = null;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("ss-show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { toast.classList.remove("ss-show"); }, 3200);
    }

    /* ---- breathing overlay ---- */
    var breathOv = el("div", "ss-overlay");
    breathOv.innerHTML =
      '<div class="ss-overlay-inner" style="text-align:center">' +
      '<button class="ss-close" style="position:absolute;top:24px;right:24px;font-size:13px;color:#5A5652">Close Esc</button>' +
      '<div class="ss-breath"><span class="ss-breath-label" style="font-family:Fraunces,serif;font-size:20px;color:#6B7F6E;text-transform:capitalize">inhale</span></div>' +
      '<p class="ss-breath-text" style="margin-top:32px;color:#2D2A26;font-size:15px">Inhale through nose 4s</p></div>';
    body.appendChild(breathOv);
    var breathCircle = breathOv.querySelector(".ss-breath");
    var breathLabel = breathOv.querySelector(".ss-breath-label");
    var breathText = breathOv.querySelector(".ss-breath-text");
    var breathOn = false, breathCancel = false;
    function breathLoop() {
      breathCircle.className = "ss-breath inhale"; breathLabel.textContent = "inhale"; breathText.textContent = "Inhale through nose 4s";
      setTimeout(function () {
        if (breathCancel) return;
        breathCircle.className = "ss-breath hold"; breathLabel.textContent = "hold"; breathText.textContent = "Hold 7s";
        setTimeout(function () {
          if (breathCancel) return;
          breathCircle.className = "ss-breath exhale"; breathLabel.textContent = "exhale"; breathText.textContent = "Exhale slowly 8s";
          setTimeout(function () { if (!breathCancel && breathOn) breathLoop(); }, 8000);
        }, 7000);
      }, 4000);
    }
    function openBreath() { breathOn = true; breathCancel = false; breathOv.classList.add("ss-show"); if (!reduce) breathLoop(); }
    function closeBreath() { breathOn = false; breathCancel = true; breathOv.classList.remove("ss-show"); }
    breathOv.querySelector(".ss-close").addEventListener("click", closeBreath);

    /* ---- grounding overlay ---- */
    var groundSteps = ["Things you SEE", "Things you TOUCH", "Things you HEAR", "Things you SMELL", "Things you TASTE"];
    var stepHtml = groundSteps.map(function (s, i) {
      return '<div class="ss-ground-step"><span>' + (5 - i) + '</span><span style="font-size:14px;font-weight:500;color:#2D2A26;line-height:1.4">' + s + '</span></div>';
    }).join("");
    var groundOv = el("div", "ss-overlay");
    groundOv.innerHTML =
      '<div class="ss-overlay-inner"><div class="ss-card">' +
      '<div style="display:flex;align-items:flex-start;justify-content:space-between">' +
      '<div><h3 style="font-family:Fraunces,serif;font-size:22px;color:#2D2A26">Grounding</h3>' +
      '<p style="font-size:12.5px;color:#6B7F6E;margin-top:4px">5-4-3-2-1 &middot; come back to the present</p></div>' +
      '<button class="ss-gclose" style="font-size:12px;color:#5A5652">Close Esc</button></div>' +
      '<div style="margin-top:20px">' + stepHtml + '</div>' +
      '<p style="margin-top:16px;font-size:12px;color:#5A5652;line-height:1.6">Breathe slowly as you notice each one.</p></div></div>';
    body.appendChild(groundOv);
    function openGround() { groundOv.classList.add("ss-show"); }
    function closeGround() { groundOv.classList.remove("ss-show"); }
    groundOv.querySelector(".ss-gclose").addEventListener("click", closeGround);

    /* ---- floating grounding button (addition) ---- */
    var fab = el("button", "ss-fab", "Ground &#10047;");
    fab.addEventListener("click", openGround);
    body.appendChild(fab);

    /* ---- night garden ---- */
    var garden = el("div", "ss-garden");
    for (var i = 0; i < 20; i++) {
      var f = el("div", "ss-firefly");
      f.style.left = (Math.random() * 100) + "vw";
      f.style.top = (Math.random() * 100) + "vh";
      garden.appendChild(f);
      if (!reduce) {
        animateFirefly(f, i);
      }
    }
    if (!reduce) body.appendChild(garden);
    function animateFirefly(f, idx) {
      function step() {
        f.style.transition = "left 8s ease-in-out, top 8s ease-in-out, opacity 4s ease-in-out";
        f.style.left = (Math.random() * 100) + "vw";
        f.style.top = (Math.random() * 100) + "vh";
        f.style.opacity = (0.2 + Math.random() * 0.7).toFixed(2);
        setTimeout(step, 6000 + Math.random() * 4000);
      }
      setTimeout(step, idx * 150);
    }

    /* ---- confetti words ---- */
    var confetti = el("div", "ss-confetti"); body.appendChild(confetti);
    var words = ["resilience", "hope", "growth", "belonging", "breathe", "soften", "flourish"];
    function spawnWords() {
      words.forEach(function (w, i) {
        var d = el("div", "ss-word", w);
        d.style.left = (10 + Math.random() * 80) + "vw";
        d.style.transform = "rotate(" + (-15 + Math.random() * 30) + "deg)";
        confetti.appendChild(d);
        if (reduce) { d.style.top = "110vh"; return; }
        d.animate(
          [{ top: "-40px", opacity: 0 }, { opacity: 1, offset: 0.1 }, { opacity: 1, offset: 0.9 }, { top: "110vh", opacity: 0 }],
          { duration: 6000, delay: i * 120, easing: "ease-in" }
        ).onfinish = function () { d.remove(); };
      });
    }

    /* ---- konami code ---- */
    var konami = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];
    var kbuf = [];
    window.addEventListener("keydown", function (e) {
      kbuf.push(e.key); if (kbuf.length > konami.length) kbuf.shift();
      if (kbuf.join(",") === konami.join(",")) {
        if (garden.style.display === "none" || !garden.parentNode) {
          if (!reduce) body.appendChild(garden);
          showToast("You found the resilience garden 🌱");
        } else {
          garden.remove(); showToast("Daylight restored ☀️");
        }
        kbuf.length = 0;
      }
    });

    /* ---- logo 5-tap breathing ---- */
    var logo = document.querySelector('nav a[href="#"]');
    var logoTaps = [];
    if (logo) {
      logo.addEventListener("click", function () {
        var now = Date.now();
        logoTaps = logoTaps.filter(function (t) { return now - t < 3000; });
        logoTaps.push(now);
        if (logoTaps.length >= 5) {
          openBreath();
          showToast("Breathing space opened — inhale with me 🧘");
          logoTaps = [];
        } else if (logoTaps.length === 1) {
          showToast("Logo holds a secret — try 5 quick taps");
        } else {
          showToast((5 - logoTaps.length) + " more to unlock breathing ritual");
        }
      });
    }

    /* ---- flourish keystroke buffer ---- */
    var fbuf = "";
    window.addEventListener("keydown", function (e) {
      if (e.key.length === 1 && /[a-z]/i.test(e.key)) {
        fbuf = (fbuf + e.key.toLowerCase()).slice(-8);
        if (fbuf === "flourish") { spawnWords(); fbuf = ""; }
      }
    });

    /* ---- idle timer on #booking ---- */
    var booking = document.getElementById("booking");
    if (booking) {
      var idleTimer = null, lastActive = Date.now(), bookingIdleShown = false;
      function resetIdle() {
        lastActive = Date.now(); bookingIdleShown = false;
        if (idleTimer) clearTimeout(idleTimer);
        idleTimer = setTimeout(function () {
          if (!bookingIdleShown && isInView(booking)) {
            bookingIdleShown = true;
            showToast("Ready to reach out? ✈️ The booking is just below.");
          }
        }, 8000);
      }
      function isInView(elm) {
        var r = elm.getBoundingClientRect();
        return r.top < window.innerHeight && r.bottom > 0;
      }
      ["scroll","touchmove","wheel","keydown","mousemove"].forEach(function (ev) {
        window.addEventListener(ev, resetIdle, { passive: true });
      });
      resetIdle();
    }

    /* ---- death cafe hover hint ---- */
    document.querySelectorAll("*").forEach(function (n) {
      if (n.children.length === 0 && /Death Cafe/i.test(n.textContent || "")) {
        var t = null;
        n.parentNode.addEventListener("mouseenter", function () {
          t = setTimeout(function () { showToast("Death Cafés are open, gentle spaces. Want to know more? 🍵"); }, 2500);
        });
        n.parentNode.addEventListener("mouseleave", function () { if (t) clearTimeout(t); });
      }
    });

    /* ---- escape closes overlays ---- */
    window.addEventListener("keydown", function (e) {
      if (e.key === "Escape") { closeBreath(); closeGround(); }
    });

    /* ---- console message ---- */
    try {
      console.log("%c🌱 You found a quiet corner. Dr. Shikha Soni's space — built with care, not caffeine.",
        "font-family: Fraunces, serif; font-size: 22px; color: #6B7F6E; padding: 12px 20px;");
      console.log("%cTry typing 'flourish'. Or click the logo 5 times. Or ⬆⬆⬇⬇⬅➡⬅➡ B A",
        "font-size: 12px; color: #A9BFAE;");
    } catch (e) {}
  });
})();
</script>
